<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamachi the Psychotic Killer Press Kit</title>
    <style>
        @font-face {
            font-family: 'FSEX300';
            src: url('https://gavinoriley.github.io/assets/FSEX300.woff2') format('woff2'),
                 url('https://gavinoriley.github.io/assets/FSEX300.woff') format('woff'),
                 url('https://gavinoriley.github.io/assets/FSEX300.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        .navbar, .navbar a { font-family: 'FSEX300', Arial, sans-serif; }
        * { cursor: url('https://gavinoriley.github.io/assets/sprCursor_3.png'), auto; }
        body {
            margin: 0;
            background-color: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px; /* clears the fixed navbar */
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #00008B;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 48px;
            z-index: 1000;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            font-size: 26px;
            text-shadow: 1px 1px 2px black;
        }
        .navbar a:hover { color: #ddd; text-decoration: none; }
        .navbar a.devlog-link { color: #ffff00; }
        .navbar a.devlog-link:hover { color: #cccc00; text-decoration: none; }
        .navbar a.buy-game-link { color: #ffd700; }
        .navbar a.buy-game-link:hover { color: #ccaa00; text-decoration: none; }
        @media (max-width: 768px) {
            .navbar { gap: 20px; flex-wrap: wrap; padding: 10px 0; }
            .navbar a { font-size: 16px; }
            .navbar a.play-game-link { display: none; }
        }
        .moved-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .moved-text {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 30px;
            max-width: 900px;
        }
        .moved-link {
            font-size: 2rem;
            color: #00bfff;
            text-decoration: none;
        }
        .moved-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar gered">
        <a href="https://hamachithepsychotickiller.com">HOME</a>
        <a href="https://hamachithepsychotickiller.com/about/">GAME INFO</a>
        <a href="https://store.steampowered.com/app/3355690/Hamachi_the_Psychotic_Killer/" target="_blank" class="buy-game-link">BUY GAME</a>
        <a href="https://itch.io/embed-upload/16876356?color=333333" target="_blank" class="play-game-link">PLAY GAME</a>
        <a href="https://hamachithepsychotickiller.com/devroom/">DEV ROOM</a>
    </nav>

    <div class="moved-container">
        <h1 class="moved-text">Sorry, but Hamachi's home has moved!</h1>
        <a href="https://hamachithepsychotickiller.com/playme/" class="moved-link">https://hamachithepsychotickiller.com/playme/</a>
    </div>
</body>
</html>
